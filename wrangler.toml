name = "paper-boyfriend"
pages_build_output_dir = ".next"

[vars]
DATABASE_URL = "${{ DATABASE_URL }}"
R2_ENDPOINT = "${{ R2_ENDPOINT }}"
R2_BUCKET_NAME = "${{ R2_BUCKET_NAME }}"
R2_PUBLIC_URL = "${{ R2_PUBLIC_URL }}"
R2_ACCESS_KEY_ID = "${{ R2_ACCESS_KEY_ID }}"
R2_SECRET_ACCESS_KEY = "${{ R2_SECRET_ACCESS_KEY }}"
NEXT_PUBLIC_GLM_API_KEY = "${{ NEXT_PUBLIC_GLM_API_KEY }}"
NEXT_PUBLIC_VOLC_APP_ID = "${{ NEXT_PUBLIC_VOLC_APP_ID }}"
NEXT_PUBLIC_VOLC_ACCESS_KEY = "${{ NEXT_PUBLIC_VOLC_ACCESS_KEY }}"
NEXT_PUBLIC_POLLINATIONS_BASE = "${{ NEXT_PUBLIC_POLLINATIONS_BASE }}"
NEXT_PUBLIC_AZURE_SPEECH_KEY = "${{ NEXT_PUBLIC_AZURE_SPEECH_KEY }}"
NEXT_PUBLIC_AZURE_SPEECH_REGION = "${{ NEXT_PUBLIC_AZURE_SPEECH_REGION }}"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "paper-boyfriend-images"
